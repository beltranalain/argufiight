<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#d4f050"/>
  <g transform="translate(16,16)" stroke="#0c0c0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Sword 1 (top-left to bottom-right) -->
    <line x1="-8" y1="-8" x2="4" y2="4"/>
    <line x1="4" y1="4" x2="0" y2="4"/>
    <line x1="4" y1="4" x2="4" y2="0"/>
    <line x1="-4" y1="-2" x2="-2" y2="-4"/>
    <!-- Sword 2 (top-right to bottom-left) -->
    <line x1="8" y1="-8" x2="-4" y2="4"/>
    <line x1="-4" y1="4" x2="0" y2="4"/>
    <line x1="-4" y1="4" x2="-4" y2="0"/>
    <line x1="4" y1="-2" x2="2" y2="-4"/>
  </g>
</svg>
